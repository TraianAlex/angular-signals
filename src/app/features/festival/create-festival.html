<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow">
  <h2 class="text-2xl font-bold mb-6 text-gray-800">Create Festival Event (Express API)</h2>
  <app-festival-event-form
    [initialValue]="initialFormValue()"
    submitLabel="Create Festival Event"
    (submitEvent)="onSubmit($event)"
  />
  <div class="flex justify-end gap-4 pt-4">
    <a routerLink="/festival" class="px-4 py-2 text-gray-600">Cancel</a>
  </div>
</div>
